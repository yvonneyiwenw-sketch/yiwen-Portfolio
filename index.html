<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wang Yiwen — Landscape Architecture Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#3a3a3a;font-family:'Segoe UI',sans-serif}

/* ── top bar ── */
#topbar{position:fixed;top:0;left:0;width:100%;height:48px;background:rgba(15,15,15,.72);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);display:none;align-items:center;justify-content:space-between;padding:0 20px;z-index:500}
#topbar .ttl{color:#fff;font-size:.88rem;font-weight:600;opacity:.85}
#topbar .pg {color:#fff;font-size:.78rem;opacity:.45}

/* ── stage ── */
#stage{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;padding-top:48px}

/* ── book ── */
#book{position:relative;display:flex;box-shadow:0 40px 80px rgba(0,0,0,.7)}

/* static page halves */
.pg-half{position:relative;overflow:hidden;background:#fff;flex-shrink:0}
.pg-half.L{border-radius:3px 0 0 3px}
.pg-half.R{border-radius:0 3px 3px 0}
/* spine gradients */
.pg-half.L::after {content:'';position:absolute;top:0;right:0;width:36px;height:100%;background:linear-gradient(to right,transparent,rgba(0,0,0,.18));pointer-events:none;z-index:2}
.pg-half.R::before{content:'';position:absolute;top:0;left:0; width:36px;height:100%;background:linear-gradient(to left, transparent,rgba(0,0,0,.18));pointer-events:none;z-index:2}

/* ── flip container: sits exactly over right half ── */
#flipper{position:absolute;top:0;right:0;pointer-events:none;overflow:hidden;z-index:10;display:none}

/* the two sub-canvases inside #flipper:
   #fc-front  — face of the turning page (seen before it passes 90°)
   #fc-back   — back of the turning page (seen after 90°, mirror-flipped)
   Both live inside a perspective wrapper */
#flip-inner{position:absolute;top:0;left:0;width:100%;height:100%;transform-style:preserve-3d;perspective:1200px}
#fc-front,#fc-back{position:absolute;top:0;left:0;backface-visibility:hidden;transform-origin:left center}
#fc-back{transform:rotateY(180deg)} /* initially hidden — back face */

/* page curl shadow overlay */
#flip-shadow{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to right,rgba(0,0,0,.22),transparent 50%);pointer-events:none;opacity:0}

/* ── controls ── */
#ctrls{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:10px;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:8px 18px;z-index:500}
.cb{background:none;border:none;color:#fff;font-size:1.1rem;cursor:pointer;padding:3px 10px;border-radius:50px;transition:background .15s;line-height:1}
.cb:hover:not(:disabled){background:rgba(255,255,255,.14)}
.cb:disabled{opacity:.28;cursor:default}
#plbl{font-size:.8rem;color:#fff;opacity:.6;min-width:86px;text-align:center}
.sep{width:1px;height:17px;background:rgba(255,255,255,.16)}

/* ── loading ── */
#loading{position:fixed;inset:0;background:#222;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;text-align:center;padding:2rem}
.spin{width:46px;height:46px;border:4px solid rgba(167,139,250,.2);border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#fff;opacity:.55;font-size:.92rem;max-width:340px;line-height:1.5}
.upbtn{display:inline-block;margin-top:.4rem;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;padding:.65rem 2rem;border-radius:50px;font-size:.95rem;font-weight:600;cursor:pointer}

@media(max-width:640px){.pg-half.R{display:none!important}.pg-half.L{border-radius:3px}}
</style>
</head>
<body>

<!-- Loading / upload screen -->
<div id="loading">
  <div class="spin"></div>
  <p>Loading portfolio…<br><span style="font-size:.8rem;opacity:.7">If it doesn't load automatically, select your PDF below.</span></p>
  <label class="upbtn">Choose PDF <input id="fi" type="file" accept="application/pdf" style="display:none"></label>
</div>

<div id="topbar">
  <span class="ttl">Wang Yiwen — Landscape Architecture Portfolio</span>
  <span class="pg" id="tpg"></span>
</div>

<div id="stage">
  <div id="book">
    <div class="pg-half L" id="hL"><canvas id="cL"></canvas></div>
    <div class="pg-half R" id="hR"><canvas id="cR"></canvas></div>

    <!-- Flipper: absolutely positioned over the right (or left) half -->
    <div id="flipper">
      <div id="flip-inner">
        <canvas id="fc-front"></canvas>
        <canvas id="fc-back"></canvas>
      </div>
      <div id="flip-shadow"></div>
    </div>
  </div>
</div>

<div id="ctrls">
  <button class="cb" id="bFirst">⏮</button>
  <button class="cb" id="bPrev">◀</button>
  <span id="plbl">— / —</span>
  <button class="cb" id="bNext">▶</button>
  <button class="cb" id="bLast">⏭</button>
  <div class="sep"></div>
  <button class="cb" id="bZo" style="font-size:.88rem">－</button>
  <button class="cb" id="bZi" style="font-size:.88rem">＋</button>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── CONFIG: set your PDF path here for GitHub Pages ──
const PDF_URL = 'portfolio.pdf'; // put your PDF in the same repo folder

// ── state ──────────────────────────────────────────────────
let pdf=null,total=0,spread=1,scale=1,busy=false;

const $=id=>document.getElementById(id);
const loading=$('loading'),topbar=$('topbar'),ctrls=$('ctrls');
const hL=$('hL'),hR=$('hR'),cL=$('cL'),cR=$('cR');
const flipper=$('flipper'),flipInner=$('flip-inner');
const fcFront=$('fc-front'),fcBack=$('fc-back');
const flipShadow=$('flip-shadow');

// ── load PDF ───────────────────────────────────────────────
async function loadPDF(src){
  try{
    pdf=await pdfjsLib.getDocument(src).promise;
    total=pdf.numPages;
    const pg=await pdf.getPage(1);
    const vp=pg.getViewport({scale:1});
    const mw=(window.innerWidth*.88)/2, mh=window.innerHeight*.85;
    scale=Math.min(mw/vp.width, mh/vp.height, 2);
    loading.style.display='none';
    topbar.style.display='flex';
    ctrls.style.display='flex';
    spread=1; await renderSpread(1,false);
  }catch(e){
    // URL failed → wait for manual upload
    $('loading').querySelector('p').textContent='Select your portfolio PDF to begin.';
    $('loading').querySelector('.spin').style.display='none';
  }
}

// ── render a page onto a canvas ────────────────────────────
async function renderPage(n,canvas){
  if(n<1||n>total) return;
  const pg=await pdf.getPage(n);
  const vp=pg.getViewport({scale});
  canvas.width=vp.width; canvas.height=vp.height;
  await pg.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
}

async function renderSpread(left,animate,dir){
  const right=left+1, hasR=right<=total;
  hR.style.display=hasR?'':'none';
  await renderPage(left,cL);
  if(hasR) await renderPage(right,cR);
  hL.style.width=cL.width+'px';  hL.style.height=cL.height+'px';
  if(hasR){hR.style.width=cR.width+'px'; hR.style.height=cR.height+'px';}
  if(animate && dir) await flipAnimation(left,right,dir);
  updateUI();
}

// ──────────────────────────────────────────────────────────
// FLIP ANIMATION — FlippingBook style
//
// NEXT (L→R turn): right page lifts, curls left over the spine,
//   revealing new left page underneath.
// PREV (R→L turn): left page lifts, curls right over the spine,
//   revealing new right page underneath.
//
// Technique: We use two canvases (front/back) inside a preserve-3d
// container. The outer #flipper div clips to the active half.
// The pivot is the spine (left edge of right half / right edge of left half).
// rotateY goes 0 → -180 (next) or 0 → +180 (prev).
// ──────────────────────────────────────────────────────────
async function flipAnimation(newLeft, newRight, dir){
  if(busy) return; busy=true;

  const pw=cL.width, ph=cL.height;

  // ── What shows on front and back of the turning leaf? ──
  // For NEXT: front = old right page (being turned away), back = new left page
  // For PREV: front = old left page (being turned away), back = new right page
  const oldSpread = dir==='next' ? spread-2 : spread+2;
  const frontPage = dir==='next' ? oldSpread+1 : oldSpread;
  const backPage  = dir==='next' ? newLeft     : newRight;

  // Render front face
  await renderPage(Math.max(1,Math.min(total,frontPage)), fcFront);
  // Render back face (will be seen mirror-flipped)
  await renderPage(Math.max(1,Math.min(total,backPage)), fcBack);

  // Make both flip canvases the same size as one page
  [fcFront,fcBack].forEach(c=>{c.width=pw;c.height=ph;});
  // Re-render now we've set sizes
  await renderPage(Math.max(1,Math.min(total,frontPage)), fcFront);
  await renderPage(Math.max(1,Math.min(total,backPage)),  fcBack);

  // ── Position #flipper over the active half ──
  // For NEXT the leaf starts on the right half and pivots left over spine.
  // For PREV the leaf starts on the left half and pivots right.
  flipper.style.width=pw+'px';
  flipper.style.height=ph+'px';
  flipper.style.display='block';

  if(dir==='next'){
    // flipper sits over right half
    flipper.style.right='0'; flipper.style.left='auto';
    flipInner.style.perspective='1200px';
    flipInner.style.perspectiveOrigin='left center';
    // front pivots from left edge
    fcFront.style.transformOrigin='left center';
    fcBack.style.transformOrigin ='left center';
    // back face default rotateY(180deg) already set in CSS
  } else {
    // flipper sits over left half
    flipper.style.left='0'; flipper.style.right='auto';
    flipInner.style.perspective='1200px';
    flipInner.style.perspectiveOrigin='right center';
    fcFront.style.transformOrigin='right center';
    fcBack.style.transformOrigin ='right center';
  }

  // ── Animate ──────────────────────────────────────────────
  const duration=560; // ms — matches FlippingBook feel
  const startAngle=0, endAngle= dir==='next' ? -180 : 180;

  await tween(duration, t=>{
    // ease-in-out cubic
    const e = t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
    const angle = endAngle * e;

    // Slight page-bow: a gentle Z rotation that peaks at 90°
    const bow = Math.sin(e*Math.PI) * (dir==='next'?-4:4);

    const tf=`rotateY(${angle}deg) rotateZ(${bow}deg)`;
    fcFront.style.transform = tf;
    // back face starts at 180°, so total = 180+angle
    fcBack.style.transform  = `rotateY(${180+angle}deg) rotateZ(${bow}deg)`;

    // Shadow: strongest at 90°
    const shadowPeak=Math.sin(e*Math.PI);
    flipShadow.style.opacity=shadowPeak*.55;
    flipShadow.style.background= dir==='next'
      ? `linear-gradient(to right, rgba(0,0,0,${(shadowPeak*.4).toFixed(2)}), transparent 60%)`
      : `linear-gradient(to left,  rgba(0,0,0,${(shadowPeak*.4).toFixed(2)}), transparent 60%)`;
  });

  // ── Teardown ──────────────────────────────────────────────
  flipper.style.display='none';
  fcFront.style.transform='';
  fcBack.style.transform='rotateY(180deg)';
  flipShadow.style.opacity=0;
  busy=false;
}

function tween(ms,cb){
  return new Promise(res=>{
    const s=performance.now();
    (function loop(now){
      const t=Math.min((now-s)/ms,1);
      cb(t);
      t<1 ? requestAnimationFrame(loop) : res();
    })(performance.now());
  });
}

// ── UI ─────────────────────────────────────────────────────
function updateUI(){
  const r=spread+1,hasR=r<=total;
  const lbl=`${spread}${hasR?'–'+r:''} / ${total}`;
  $('plbl').textContent=lbl; $('tpg').textContent=lbl;
  $('bPrev').disabled=$('bFirst').disabled=spread<=1;
  $('bNext').disabled=$('bLast').disabled=spread+1>total;
}

async function go(n,dir){
  if(busy||!pdf) return;
  spread=n;
  await renderSpread(spread,true,dir);
}

$('bNext').onclick =()=>go(Math.min(spread+2,total%2===0?total-1:total),'next');
$('bPrev').onclick =()=>go(Math.max(spread-2,1),'prev');
$('bFirst').onclick=()=>go(1,'prev');
$('bLast').onclick =()=>go(total%2===0?total-1:total,'next');
$('bZi').onclick   =async()=>{scale=Math.min(scale*1.2,3);  if(pdf)await renderSpread(spread,false)};
$('bZo').onclick   =async()=>{scale=Math.max(scale/1.2,.3); if(pdf)await renderSpread(spread,false)};

document.addEventListener('keydown',e=>{
  if(!pdf)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown') $('bNext').click();
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   $('bPrev').click();
});

// ── drag & drop ────────────────────────────────────────────
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',async e=>{
  e.preventDefault();
  const f=e.dataTransfer.files[0];
  if(f&&f.type==='application/pdf'){
    const ab=await f.arrayBuffer();
    loadPDF({data:new Uint8Array(ab)});
  }
});
$('fi').onchange=async e=>{
  const f=e.target.files[0]; if(!f)return;
  const ab=await f.arrayBuffer();
  loadPDF({data:new Uint8Array(ab)});
};

// ── auto-load from GitHub Pages PDF_URL ────────────────────
loadPDF(PDF_URL);
</script>
</body>
</html>
