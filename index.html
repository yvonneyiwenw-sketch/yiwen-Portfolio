<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wang Yiwen — Landscape Architecture Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#2e2e2e;font-family:'Segoe UI',sans-serif}

/* ── top bar ── */
#topbar{position:fixed;top:0;left:0;width:100%;height:44px;background:rgba(10,10,10,.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);display:none;align-items:center;justify-content:space-between;padding:0 16px;z-index:500}
#topbar .ttl{color:#fff;font-size:.82rem;font-weight:600;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
#topbar .pg{color:#fff;font-size:.75rem;opacity:.45;flex-shrink:0}

/* ── stage ── */
#stage{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;padding-top:44px}

/* ── book ── */
#book{position:relative;display:flex;box-shadow:0 24px 64px rgba(0,0,0,.8)}

/* page halves */
.pg-half{position:relative;overflow:hidden;background:#fff;flex-shrink:0}
.pg-half.L{border-radius:3px 0 0 3px}
.pg-half.R{border-radius:0 3px 3px 0}
.pg-half.L::after{content:'';position:absolute;top:0;right:0;width:32px;height:100%;background:linear-gradient(to right,transparent,rgba(0,0,0,.15));pointer-events:none;z-index:2}
.pg-half.R::before{content:'';position:absolute;top:0;left:0;width:32px;height:100%;background:linear-gradient(to left,transparent,rgba(0,0,0,.15));pointer-events:none;z-index:2}

/* ── slide overlay: covers the entire book during transition ── */
#slide-over{
  position:absolute;top:0;left:0;
  pointer-events:none;
  z-index:20;
  overflow:hidden;
  display:none;
}
#slide-over canvas{display:block}
/* moving shadow edge */
#slide-edge{
  position:absolute;top:0;
  width:28px;height:100%;
  pointer-events:none;
}

/* ── controls ── */
#ctrls{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:8px;background:rgba(0,0,0,.62);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:7px 16px;z-index:500}
.cb{background:none;border:none;color:#fff;font-size:1.05rem;cursor:pointer;padding:4px 10px;border-radius:50px;transition:background .15s;line-height:1;-webkit-tap-highlight-color:transparent}
.cb:hover:not(:disabled){background:rgba(255,255,255,.14)}
.cb:disabled{opacity:.25;cursor:default}
#plbl{font-size:.78rem;color:#fff;opacity:.6;min-width:80px;text-align:center}
.sep{width:1px;height:16px;background:rgba(255,255,255,.16)}

/* ── loading ── */
#loading{position:fixed;inset:0;background:#222;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
.spin{width:44px;height:44px;border:4px solid rgba(167,139,250,.2);border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#fff;opacity:.5;font-size:.9rem}

/* ── mobile: single page ── */
@media(max-width:640px){
  .pg-half.R{display:none!important}
  .pg-half.L{border-radius:3px}
  #stage{padding-top:44px}
}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p>Loading portfolio…</p></div>

<div id="topbar">
  <span class="ttl">Wang Yiwen — Landscape Architecture Portfolio</span>
  <span class="pg" id="tpg"></span>
</div>

<div id="stage">
  <div id="book">
    <div class="pg-half L" id="hL"><canvas id="cL"></canvas></div>
    <div class="pg-half R" id="hR"><canvas id="cR"></canvas></div>
    <!-- sliding page overlay -->
    <div id="slide-over">
      <canvas id="cSlide"></canvas>
      <div id="slide-edge"></div>
    </div>
  </div>
</div>

<div id="ctrls">
  <button class="cb" id="bFirst">⏮</button>
  <button class="cb" id="bPrev">◀</button>
  <span id="plbl">— / —</span>
  <button class="cb" id="bNext">▶</button>
  <button class="cb" id="bLast">⏭</button>
  <div class="sep"></div>
  <button class="cb" id="bZo" style="font-size:.84rem">－</button>
  <button class="cb" id="bZi" style="font-size:.84rem">＋</button>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── CONFIG ─────────────────────────────────────────────────
const PDF_URL = 'portfolio.pdf'; // must be in same GitHub repo folder

// ── state ──────────────────────────────────────────────────
let pdf=null,total=0,spread=1,scale=1,busy=false;
const isMobile=()=>window.innerWidth<=640;

const $=id=>document.getElementById(id);
const loading=$('loading'),topbar=$('topbar'),ctrls=$('ctrls');
const hL=$('hL'),hR=$('hR'),cL=$('cL'),cR=$('cR');
const slideOver=$('slide-over'),cSlide=$('cSlide'),slideEdge=$('slide-edge');

// ── load PDF ───────────────────────────────────────────────
async function loadPDF(src){
  try{
    pdf=await pdfjsLib.getDocument(src).promise;
    total=pdf.numPages;
    await computeScale();
    loading.style.display='none';
    topbar.style.display='flex';
    ctrls.style.display='flex';
    spread=1;
    await renderSpread(1,false);
  }catch(e){
    $('loading').querySelector('p').textContent='Could not load portfolio.pdf — check the file is in your repo.';
    $('loading').querySelector('.spin').style.display='none';
  }
}

async function computeScale(){
  const pg=await pdf.getPage(1);
  const vp=pg.getViewport({scale:1});
  const topH=44;
  if(isMobile()){
    // single page — fill screen width with a pixel-density boost
    const dpr=window.devicePixelRatio||1;
    const maxW=window.innerWidth*.96;
    const maxH=(window.innerHeight-topH)*.96;
    scale=Math.min(maxW/vp.width, maxH/vp.height)*dpr;
    scale=Math.min(scale,4); // cap at 4× to avoid huge canvases
  } else {
    const maxW=(window.innerWidth*.9)/2;
    const maxH=(window.innerHeight-topH)*.9;
    scale=Math.min(maxW/vp.width, maxH/vp.height, 2.5);
  }
}

// ── render a page onto a canvas ───────────────────────────
async function renderPage(n,canvas){
  if(!pdf||n<1||n>total) return;
  const pg=await pdf.getPage(n);
  const vp=pg.getViewport({scale});
  canvas.width=vp.width; canvas.height=vp.height;
  // on mobile, shrink canvas display size back to fit screen
  if(isMobile()){
    const dpr=window.devicePixelRatio||1;
    canvas.style.width =(vp.width /dpr)+'px';
    canvas.style.height=(vp.height/dpr)+'px';
  } else {
    canvas.style.width=''; canvas.style.height='';
  }
  await pg.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
}

// ── render spread (two pages side by side) ────────────────
async function renderSpread(left,animate,dir){
  const right=left+1, hasR=right<=total && !isMobile();
  hR.style.display=hasR?'':'none';
  await renderPage(left,cL);
  if(hasR) await renderPage(right,cR);

  const dispW = isMobile() ? parseInt(cL.style.width||cL.width) : cL.width;
  const dispH = isMobile() ? parseInt(cL.style.height||cL.height) : cL.height;
  hL.style.width =dispW+'px'; hL.style.height=dispH+'px';
  if(hasR){ hR.style.width=dispW+'px'; hR.style.height=dispH+'px'; }

  if(animate&&dir) await slideFlip(left,right,dir,dispW,dispH);
  updateUI();
}

// ──────────────────────────────────────────────────────────
// SLIDE-FLIP ANIMATION
// A clean, smooth page slide — like turning a page on a real book.
// The new page slides in from the spine edge over ~480ms with
// an ease-out curve and a thin trailing shadow edge.
// ──────────────────────────────────────────────────────────
async function slideFlip(newLeft,newRight,dir,pw,ph){
  if(busy) return; busy=true;

  // Which page slides in?
  // next: new left page slides in from right→left across the left half
  // prev: new right page slides in from left→right across the right half
  const slidePage = dir==='next' ? newLeft : (newRight<=total?newRight:newLeft);

  // Render the incoming page onto cSlide
  const realW=cL.width, realH=cL.height;
  cSlide.width=realW; cSlide.height=realH;
  cSlide.style.width=pw+'px'; cSlide.style.height=ph+'px';
  await renderPage(slidePage, cSlide);

  // Position slide-over on top of the correct half
  slideOver.style.width =pw+'px';
  slideOver.style.height=ph+'px';
  slideOver.style.display='block';
  slideOver.style.overflow='hidden';
  slideOver.style.borderRadius = dir==='next' ? '3px 0 0 3px' : '0 3px 3px 0';

  // The shadow edge sits on the leading edge of the sliding page
  slideEdge.style.top='0';
  slideEdge.style.height=ph+'px';

  if(dir==='next'){
    // slide-over on left half
    slideOver.style.left='0';
    slideOver.style.right='auto';
    // page starts off-screen to the right (+pw), slides to 0
    slideEdge.style.right='0'; slideEdge.style.left='auto';
    slideEdge.style.background='linear-gradient(to left,rgba(0,0,0,.18),transparent)';
  } else {
    // slide-over on right half
    slideOver.style.left=pw+'px';
    slideOver.style.right='auto';
    slideEdge.style.left='0'; slideEdge.style.right='auto';
    slideEdge.style.background='linear-gradient(to right,rgba(0,0,0,.18),transparent)';
  }

  const duration=420;

  await tween(duration, t=>{
    // ease-out quart: fast start, smooth landing
    const e=1-Math.pow(1-t,4);
    const offset = dir==='next'
      ? pw*(1-e)        // moves from +pw → 0
      : -pw*(1-e);      // moves from -pw → 0

    cSlide.style.transform=`translateX(${offset}px)`;
    slideEdge.style.opacity=(1-e).toFixed(3);
  });

  slideOver.style.display='none';
  cSlide.style.transform='';
  slideEdge.style.opacity='0';
  busy=false;
}

function tween(ms,cb){
  return new Promise(res=>{
    const s=performance.now();
    (function loop(now){
      const t=Math.min((now-s)/ms,1);
      cb(t);
      t<1?requestAnimationFrame(loop):res();
    })(performance.now());
  });
}

// ── UI ─────────────────────────────────────────────────────
function updateUI(){
  const r=spread+1, hasR=r<=total;
  const lbl=`${spread}${hasR&&!isMobile()?'–'+r:''} / ${total}`;
  $('plbl').textContent=lbl; $('tpg').textContent=lbl;
  $('bPrev').disabled=$('bFirst').disabled=spread<=1;
  $('bNext').disabled=$('bLast').disabled=(isMobile()?spread>=total:spread+1>=total);
}

async function go(n,dir){
  if(busy||!pdf) return;
  spread=n;
  await renderSpread(spread,true,dir);
}

$('bNext').onclick=()=>{
  const step=isMobile()?1:2;
  const maxSpread=isMobile()?total:(total%2===0?total-1:total);
  go(Math.min(spread+step,maxSpread),'next');
};
$('bPrev').onclick=()=>{
  const step=isMobile()?1:2;
  go(Math.max(spread-step,1),'prev');
};
$('bFirst').onclick=()=>go(1,'prev');
$('bLast').onclick=()=>{
  const last=isMobile()?total:(total%2===0?total-1:total);
  go(last,'next');
};
$('bZi').onclick=async()=>{scale=Math.min(scale*1.2,5); if(pdf)await renderSpread(spread,false)};
$('bZo').onclick=async()=>{scale=Math.max(scale/1.2,.3); if(pdf)await renderSpread(spread,false)};

document.addEventListener('keydown',e=>{
  if(!pdf)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown') $('bNext').click();
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   $('bPrev').click();
});

// touch swipe
let tx0=null;
document.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{
  if(tx0===null||!pdf)return;
  const dx=e.changedTouches[0].clientX-tx0;
  if(Math.abs(dx)>50){ dx<0?$('bNext').click():$('bPrev').click(); }
  tx0=null;
},{passive:true});

// re-render on resize
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(async()=>{
    if(!pdf)return;
    await computeScale();
    await renderSpread(spread,false);
  },200);
});

// ── auto-load ──────────────────────────────────────────────
loadPDF(PDF_URL);
</script>
</body>
</html>
